<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Chat Astral</title>

<style>

/*FONDO CON IMAGEN DESENFOCADA */

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
color:white;
display:flex;
height:100vh;
overflow:hidden;
}

body::before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;

/* CAMBIA ESTA IMAGEN */
background:url("fondo.jpg") no-repeat center center/cover;

filter:blur(10px);
z-index:-1;
}

/*CAPA OSCURA ENCIMA */

body::after{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
z-index:-1;
}

/* SIDEBAR */

.sidebar{
width:260px;
background:rgba(32,33,35,0.95);
padding:20px;
box-sizing:border-box;
display:flex;
flex-direction:column;
justify-content:space-between;
}

/* PARTE SUPERIOR SIDEBAR */

.sidebar-top{
text-align:center;
}

.logo{
font-size:22px;
font-weight:bold;
margin-bottom:20px;
}

/* IMAGEN UNIVERSIDAD */

.university-logo{
width:100%;
max-width:120px;
margin:10px auto;
display:block;
border-radius:10px;
}

/* TEXTO */

.menu{
color:#ddd;
font-size:14px;
line-height:1.6;
text-align:justify;
}

/* FOOTER SIDEBAR */

.sidebar-footer{
font-size:12px;
color:#aaa;
text-align:center;
margin-top:20px;
}

/* AREA PRINCIPAL */

.main{
flex:1;
display:flex;
flex-direction:column;
}

/* HEADER */

.header{
background:rgba(68,70,84,0.9);
padding:15px;
text-align:center;
font-size:18px;
backdrop-filter:blur(5px);
}

/* ZONA CHAT */

.chat-area{
flex:1;
display:flex;
justify-content:center;
align-items:center;
padding:40px;
}

/* CONTENEDOR CHAT */

.chat-container{
width:100%;
max-width:850px;
height:650px;
background:rgba(68,70,84,0.85);
border-radius:15px;
overflow:hidden;
box-shadow:0 0 30px rgba(0,0,0,0.5);
backdrop-filter:blur(10px);
}

#chatbot-container{
width:100%;
height:100%;
}

/* ELIMINAR BURBUJA */

.vfrc-launcher,
.vfrc-widget--launcher,
div[style*="position: fixed"][style*="bottom"] {
display: none !important;
}

</style>

</head>

<body>

<!-- 🔥 SIDEBAR -->
<div class="sidebar">

<div class="sidebar-top">

<div class="logo">
Chat Astral
</div>

<!-- LOGO UNIVERSIDAD -->
<img src="logo_universidad.png" class="university-logo">

<div class="menu">
<p><strong>Asistente IA</strong></p>
<p>
Esta página administra información sobre el catastro multipropósito como solución al proyecto de inteligencia artificial aplicada al territorio.
</p>

<p><strong>Carrera:</strong><br>
Ingeniería Catastral y Geodesia</p>

</div>

</div>

<!-- FOOTER -->
<div class="sidebar-footer">
<p>Angelo Michel Hernández Bayona</p>
<p>20201025062</p>
</div>

</div>

<!-- CONTENIDO PRINCIPAL -->
<div class="main">

<div class="header">
Chatbot de Catastro Multipropósito
</div>

<div class="chat-area">

<div class="chat-container">
<div id="chatbot-container"></div>
</div>

</div>

</div>

<!-- VOICEFLOW -->
<script type="text/javascript">
(function(d, t) {

var v = d.createElement(t), s = d.getElementsByTagName(t)[0];

v.onload = function() {

window.voiceflow.chat.load({

verify: { projectID: '69b81b6035efdab2c3311650' },

url: 'https://general-runtime.voiceflow.com',

versionID: 'production',

render: {
mode: 'embedded',
target: document.getElementById("chatbot-container")
}

});

}

v.src = "https://cdn.voiceflow.com/widget-next/bundle.mjs";
v.type = "text/javascript";
s.parentNode.insertBefore(v, s);

})(document, 'script');
</script>

</body>

</html>
