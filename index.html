<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Chat Astral</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#343541;
color:white;
display:flex;
height:100vh;
}

/* SIDEBAR */

.sidebar{
width:250px;
background:#202123;
padding:20px;
box-sizing:border-box;
}

.logo{
font-size:22px;
font-weight:bold;
margin-bottom:30px;
}

.menu{
color:#ccc;
font-size:14px;
line-height:1.8;
}

/* AREA PRINCIPAL */

.main{
flex:1;
display:flex;
flex-direction:column;
}

/* HEADER */

.header{
background:#444654;
padding:15px;
text-align:center;
font-size:18px;
}

/* ZONA DEL CHAT */

.chat-area{
flex:1;
display:flex;
justify-content:center;
align-items:center;
padding:40px;
}

.chat-container{
width:100%;
max-width:800px;
height:600px;
background:#444654;
border-radius:10px;
overflow:hidden;
box-shadow:0 0 20px rgba(0,0,0,0.3);
}

#chatbot-container{
width:100%;
height:100%;
}

</style>

</head>

<body>

<div class="sidebar">

<div class="logo">
Chat Astral
</div>

<div class="menu">
<p> Asistente IA</p>
<p>Esta pagina se encarga de administrar información sobre el catastro multipropósito como solución al proyecto #3 para la materia de inteligencia artificial aplicada al territorio</p>

</div>

</div>

<div class="main">

<div class="header">
Chatbot de Catastro Multipropósito
</div>

<div class="chat-area">

<div class="chat-container">

<div id="chatbot-container"></div>

</div>

</div>

</div>

<script type="text/javascript">
(function(d, t) {

var v = d.createElement(t), s = d.getElementsByTagName(t)[0];

v.onload = function() {

window.voiceflow.chat.load({

verify: { projectID: '69b81b6035efdab2c3311650' },

url: 'https://general-runtime.voiceflow.com',

versionID: 'production',

assistant: {
  container: document.getElementById("chatbot-container")
},


launcher: {
  hide: true
}

});

}

v.src = "https://cdn.voiceflow.com/widget-next/bundle.mjs";
v.type = "text/javascript";
s.parentNode.insertBefore(v, s);

})(document, 'script');
</script>

</body>

</html>
