<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CHAT ASTRAL</title>

<style>

/*  BASE */

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
display:flex;
height:100vh;
overflow:hidden;
}

/* 🔥 FONDO */

body::before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:url("fondo.jpg") no-repeat center center/cover;
filter:blur(6px);
transform: scale(1.05);
z-index:-2;
}

body::after{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(255,255,255,0.2);
z-index:-1;
}

/* 🔥 SIDEBAR GLASS */

.sidebar{
width:260px;
height:100vh;
background:rgba(255,255,255,0.6);
backdrop-filter:blur(10px);
-webkit-backdrop-filter:blur(10px);
color:#1e293b;
padding:20px;
box-sizing:border-box;
display:flex;
flex-direction:column;
justify-content:space-between;
border-right:1px solid rgba(255,255,255,0.3);
}

/* CONTENIDO */

.sidebar-top{
text-align:center;
}

.logo{
font-size:22px;
font-weight:bold;
margin-bottom:20px;
}

.university-logo{
width:100%;
max-width:120px;
margin:10px auto;
display:block;
border-radius:10px;
}

.menu{
font-size:14px;
line-height:1.6;
text-align:justify;
}

/* 🔥 BOTÓN NUEVO CHAT */

.new-chat-btn{
margin-top:20px;
padding:10px;
background:#2563eb;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
font-size:14px;
transition:0.3s;
}

.new-chat-btn:hover{
background:#1d4ed8;
}

/* FOOTER */

.sidebar-footer{
font-size:12px;
text-align:center;
color:#334155;
}

/* 🔥 MAIN */

.main{
flex:1;
display:flex;
flex-direction:column;
}

/* HEADER */

.header{
background:rgba(255,255,255,0.7);
backdrop-filter:blur(8px);
color:#1e293b;
padding:15px;
text-align:center;
font-size:18px;
border-bottom:1px solid rgba(255,255,255,0.3);
}

/* CHAT AREA */

.chat-area{
flex:1;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

/* CHAT BOX */

.chat-container{
width:100%;
max-width:900px;
min-height:600px;
background:rgba(255,255,255,0.85);
border-radius:15px;
overflow:hidden;
box-shadow:0 0 30px rgba(0,0,0,0.3);
}

/* CHATBOT */

#chatbot-container{
width:100%;
height:700px;
}

/* 🔥 OCULTAR BURBUJA */

.vfrc-launcher,
.vfrc-widget--launcher,
div[style*="position: fixed"][style*="bottom"] {
display:none !important;
}

</style>

</head>

<body>

<!-- 🔥 SIDEBAR -->
<div class="sidebar">

<div class="sidebar-top">

<div class="logo">
Chat Astral
</div>

<img src="logo_universidad.png" class="university-logo">

<div class="menu">
<p><strong>Asistente IA</strong></p>
<p>
Esta página administra información sobre el catastro multipropósito como solución al proyecto de inteligencia artificial aplicada al territorio.
</p>

<p><strong>Carrera:</strong><br>
INGENIERÍA CATASTRAL Y GEODESIA</p>

<button class="new-chat-btn" onclick="resetChat()">
+ NUEVO CHAT
</button>

</div>

</div>

<div class="sidebar-footer">
<p>ANGELO MICHEL HERNANDEZ BAYONA</p>
<p>20201025062</p>
</div>

</div>

<!-- 🔥 CONTENIDO -->
<div class="main">


<div class="chat-area">

<div class="chat-container">
<div id="chatbot-container"></div>
</div>

</div>

</div>

<!-- 🔥 VOICEFLOW -->
<script type="text/javascript">
(function(d, t) {

var v = d.createElement(t), s = d.getElementsByTagName(t)[0];

v.onload = function() {

window.voiceflow.chat.load({

verify: { projectID: '69b81b6035efdab2c3311650' },

url: 'https://general-runtime.voiceflow.com',

versionID: 'production',

render: {
mode: 'embedded',
target: document.getElementById("chatbot-container")
}

});

}

v.src = "https://cdn.voiceflow.com/widget-next/bundle.mjs";
v.type = "text/javascript";
s.parentNode.insertBefore(v, s);

})(document, 'script');

/* 🔥 FUNCIÓN NUEVO CHAT */

function resetChat(){
document.getElementById("chatbot-container").innerHTML = "";

window.voiceflow.chat.load({
verify: { projectID: '69b81b6035efdab2c3311650' },
url: 'https://general-runtime.voiceflow.com',
versionID: 'production',
render: {
mode: 'embedded',
target: document.getElementById("chatbot-container")
}
});
}

</script>

</body>

</html>
